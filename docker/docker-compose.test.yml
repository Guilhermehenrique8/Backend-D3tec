services:
  redis:
    image: redis:7-alpine
    container_name: d3tec-redis-test
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: d3tec-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
