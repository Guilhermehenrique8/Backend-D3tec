# DEV APPLICATION PROPERTIES

# Application
spring.application.name=NomeDoSeuProjeto

# Spring Main
spring.main.lazy-initialization=true

# DataSource (PostgreSQL)
# Adapte para a url do seu banco
spring.datasource.url=jdbc:postgresql://localhost:5432/d3tec
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:migrations

# HikariCP
spring.datasource.hikari.pool-name=HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=120000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.root=info
logging.level.org.springframework.web=warn
logging.level.org.hibernate=info
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=debug

# Timezone
spring.jackson.time-zone=America/Fortaleza
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

# Jwt Configuration
jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key
jwt.token.expires.in=3600
security.mfa.secret-encryption.key=

# Setup inicial
bootstrap.admin.email=admin@admin.com
bootstrap.admin.password=admin

# Mail
app.mail.enabled=true
app.mail.from-name=NomeDoSeuProjeto
app.mail.from-address=no-reply@example.com
app.mail.base-url=http://localhost:8080
app.mail.fail-fast=false
app.mail.transport=smtp
app.mail.rate-limit.min-interval-ms=500
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Redis queue
app.email.queue.enabled=true
app.email.queue.worker-enabled=true
app.email.queue.key-prefix=${spring.application.name}:email:dev
app.email.queue.claim-ttl-seconds=120
app.email.queue.max-attempts=5
app.email.queue.batch-size=10
app.email.queue.poll-delay-ms=1500
app.email.queue.stale-job-requeue-delay-ms=30000
app.email.queue.initial-backoff-seconds=30
app.email.queue.max-backoff-seconds=900
app.email.queue.idempotency-ttl-hours=24
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5s
spring.data.redis.repositories.enabled=false

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.redis.enabled=false
management.health.mail.enabled=false

# Defesa contra ataque de forca bruta
security.bruteforce.enabled=true
security.bruteforce.max-attempts=5
security.bruteforce.window-seconds=300
security.bruteforce.lock-seconds=900

# Erro http padrão
spring.mvc.problemdetails.enabled=true
